<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookMate App</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-gray-100 flex justify-center">

    <div class="max-w-md w-full bg-gray-50 min-h-screen pb-24 shadow-xl relative overflow-x-hidden">
        
        <header class="p-6 bg-white rounded-b-[32px] shadow-sm">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h1 class="text-gray-400 text-sm font-medium">Hello, Chef!</h1>
                    <p class="text-xl font-bold text-gray-800">What do you want to cook today?</p>
                </div>
                <div class="w-12 h-12 bg-orange-100 rounded-2xl flex items-center justify-center shadow-sm">
                    <i class="fa-solid fa-utensils text-orange-500 text-xl"></i>
                </div>
            </div>

            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input 
                    type="text" 
                    id="searchInput"
                    placeholder="Search recipes, ingredients..." 
                    class="w-full pl-12 pr-4 py-4 bg-gray-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-orange-500 transition-all border-none"
                />
            </div>
        </header>

        <section class="px-6 py-6 flex gap-4 overflow-x-auto no-scrollbar">
            <button onclick="filterCat('All', this)" class="cat-btn px-6 py-2 rounded-xl text-sm font-bold whitespace-nowrap bg-orange-500 text-white shadow-lg shadow-orange-200">All</button>
            <button onclick="filterCat('Myanmar', this)" class="cat-btn px-6 py-2 rounded-xl text-sm font-bold whitespace-nowrap bg-white text-gray-500 shadow-sm border border-gray-100">Myanmar</button>
            <button onclick="filterCat('Asian', this)" class="cat-btn px-6 py-2 rounded-xl text-sm font-bold whitespace-nowrap bg-white text-gray-500 shadow-sm border border-gray-100">Asian</button>
            <button onclick="filterCat('Fast Food', this)" class="cat-btn px-6 py-2 rounded-xl text-sm font-bold whitespace-nowrap bg-white text-gray-500 shadow-sm border border-gray-100">Fast Food</button>
        </section>

        <section class="px-6 py-2">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-gray-800">Trending Recipes</h2>
                <span class="text-orange-500 text-sm font-bold cursor-pointer">See all</span>
            </div>
            
            <div id="recipeGrid" class="flex gap-5 overflow-x-auto no-scrollbar pb-6">
                </div>
        </section>

        <nav class="fixed bottom-0 max-w-md w-full bg-white/90 backdrop-blur-md border-t border-gray-100 px-8 py-4 flex justify-between items-center rounded-t-[32px] shadow-2xl">
            <div class="flex flex-col items-center text-orange-500">
                <i class="fa-solid fa-house text-xl"></i>
                <span class="text-[10px] mt-1 font-bold">Home</span>
            </div>
            <div class="flex flex-col items-center text-gray-300">
                <i class="fa-solid fa-magnifying-glass text-xl"></i>
                <span class="text-[10px] mt-1 font-medium">Search</span>
            </div>
            <div class="flex flex-col items-center text-gray-300">
                <i class="fa-solid fa-robot text-xl"></i>
                <span class="text-[10px] mt-1 font-medium">AI Chef</span>
            </div>
            <div class="flex flex-col items-center text-gray-300">
                <i class="fa-solid fa-heart text-xl"></i>
                <span class="text-[10px] mt-1 font-medium">Saved</span>
            </div>
        </nav>
    </div>

    <script>
        const recipes = [
            { id: 1, name: "Thai Basil Chicken", time: "20 min", rating: 4.8, cat: "Asian", img: "https://images.unsplash.com/photo-1562967962-e7e00e4952df?w=300" },
            { id: 2, name: "Spaghetti Carbonara", time: "25 min", rating: 4.7, cat: "Fast Food", img: "https://images.unsplash.com/photo-1612874742237-6526221588e3?w=300" },
            { id: 3, name: "Myanmar Curry", time: "15 min", rating: 4.5, cat: "Myanmar", img: "https://images.unsplash.com/photo-1604908176997-125f25cc6f3d?w=300" }
        ];

        const grid = document.getElementById('recipeGrid');

        function display(list) {
            grid.innerHTML = '';
            list.forEach(r => {
                grid.innerHTML += `
                    <div class="min-w-[180px] bg-white rounded-[28px] p-4 shadow-xl shadow-gray-200/50 border border-gray-50 active:scale-95 transition-transform">
                        <img src="${r.img}" class="w-full h-36 object-cover rounded-[20px] mb-4 shadow-sm">
                        <h3 class="font-bold text-sm text-gray-800 truncate">${r.name}</h3>
                        <div class="flex items-center justify-between mt-3">
                            <div class="flex items-center gap-1 text-[10px] text-gray-400 font-medium">
                                <i class="fa-regular fa-clock text-orange-500"></i> ${r.time}
                            </div>
                            <div class="flex items-center gap-1 text-[10px] text-gray-400 font-medium">
                                <i class="fa-solid fa-star text-yellow-400"></i> ${r.rating}
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        display(recipes);

        // Search လုပ်ဆောင်ချက်
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            display(recipes.filter(r => r.name.toLowerCase().includes(val)));
        });

        // Category စစ်ထုတ်ခြင်း
        function filterCat(cat, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => {
                b.classList.remove('bg-orange-500', 'text-white', 'shadow-lg', 'shadow-orange-200');
                b.classList.add('bg-white', 'text-gray-500');
            });
            btn.classList.add('bg-orange-500', 'text-white', 'shadow-lg', 'shadow-orange-200');
            
            if(cat === 'All') display(recipes);
            else display(recipes.filter(r => r.cat === cat));
        }
    </script>
</body>
</html>
